<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SlimeVR Mocap Viewer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div id="status-bar">
        <span id="conn-status">Connecting...</span>
        <span id="tracker-count">Trackers: 0</span>
        <span id="model-status"></span>
        <span id="rec-indicator" class="rec-indicator" style="display:none"><span class="rec-dot"></span><span id="rec-timer">00:00</span></span>
      </div>
      <div id="controls">
        <button class="btn" data-cmd="reset-yaw" title="Zero yaw rotation on all trackers">Reset Yaw</button>
        <button class="btn" data-cmd="reset-full" title="Full pose reset (T-pose)">Reset Full</button>
        <button class="btn" data-cmd="reset-mounting" title="Reset mounting orientation">Reset Mounting</button>
        <button class="btn btn-rec" data-cmd="autobone-record" title="Start AutoBone recording">AB Record</button>
        <button class="btn btn-proc" data-cmd="autobone-process" title="Process AutoBone recording">AB Process</button>
        <button class="btn btn-apply" data-cmd="autobone-apply" title="Apply AutoBone results">AB Apply</button>
        <button class="btn btn-walk" data-cmd="toggle-walk" title="Toggle walking mode">Walk: OFF</button>
        <button class="btn btn-record" data-cmd="toggle-record" title="Toggle recording (screen + CSV)">Record: OFF</button>
      </div>
      <div id="angle-debug" title="90°/180° rotation detection per limb"></div>
      <div id="yoga-panel">
        <div class="yoga-header">
          <span class="yoga-title">Yoga Trainer</span>
          <label class="yoga-toggle"><input type="checkbox" id="yoga-enable"> Enable</label>
        </div>
        <div id="yoga-body" style="display:none">
          <div class="yoga-row">
            <span class="yoga-label">Pose</span>
            <select id="yoga-pose-select"></select>
          </div>
          <div class="yoga-row">
            <span class="yoga-label">Overall</span>
            <span id="yoga-score" class="yoga-value">--</span>
          </div>
          <div class="yoga-row">
            <span class="yoga-label">Hold</span>
            <span id="yoga-hold" class="yoga-value">--</span>
          </div>
          <div class="yoga-row">
            <span class="yoga-label">Status</span>
            <span id="yoga-status" class="yoga-value">--</span>
          </div>
        </div>
      </div>
      <div id="info">
        <p>Connect your sensors and ensure the SlimeVR server is running.</p>
        <p>WebSocket: <span id="ws-url">ws://localhost:21110</span></p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
