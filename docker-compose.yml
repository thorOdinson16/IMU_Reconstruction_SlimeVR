services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5005:5005/udp"
      - "21110:21110"
      - "21111:21111"
    volumes:
      - ./config.json:/app/config.json:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
