services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5005:5005/udp"
      - "21110:21110"
      - "21111:21111"
    volumes:
      - ./config.json:/app/config.json:ro
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    environment:
      - BMDT_DONGLE_PORT=/dev/ttyACM0
    group_add:
      - dialout

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend